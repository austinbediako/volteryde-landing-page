<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.2"
     baseProfile="tiny-ps"
     viewBox="0 0 100 100"
     width="100"
     height="100">
  <title>Volteryde</title>
  <!-- Solid white background — required by BIMI spec (no transparency) -->
  <rect width="100" height="100" fill="#ffffff"/>
  <!-- Volteryde green circle background -->
  <circle cx="50" cy="50" r="50" fill="#1b3a1b"/>
  <!-- V mark — simplified from the Volteryde logo -->
  <polygon points="22,28 38,28 50,58 62,28 78,28 58,72 42,72" fill="#0CCF0E"/>
  <!-- Lightning bolt through the V -->
  <polygon points="50,36 44,54 49,54 43,72 57,50 51,50 57,36" fill="#ffffff" opacity="0.9"/>
</svg>
